<div>
    <h2>Calculator</h2>
    <input type="number" [(ngModel)]="number1"/>
    <input type="number" [(ngModel)]="number2"/>
</div>
<div>
    <button
        (click)="add()">
        Add
    </button>
    <button
        (click)="subtract()">
        Subtract
    </button>
    <button
        (click)="multiply()">
        Multiply
    </button>
    <button
        (click)="divide()">
        Divide
    </button>
</div>
<div>
    <h3>{{ hidden ? '' : `Result: ${result.toFixed(2).replace(/[.,]00$/, "")}` }}</h3>
</div>
